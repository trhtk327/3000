<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עולם הארי פוטר</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial;
  color:#fff;

  /* רקע חי אבל רגוע */
  background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
  background-size:400% 400%;
  animation:bgMove 30s ease infinite; /* איטי יותר */
}

/* תנועה רגועה */
@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* כניסה */
.container{
  padding:15px;
  text-align:center;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* כותרת */
h1{
  font-size:28px;
  margin-bottom:15px;
}

/* לוח מודעות */
.notice{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.07);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.notice-title{font-size:20px;margin-bottom:10px}
.notice-item{margin:10px 0}
.notice-time{font-size:12px;opacity:0.6}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

/* כפתורים כהים עם גוון צבע */
.btn{
  display:block;
  text-decoration:none;
  color:#fff;
  padding:25px 10px;
  border-radius:15px;

  /* גוון צבע עדין */
  background:linear-gradient(145deg,#1c1f2b,#2a2f45);

  border:1px solid rgba(255,255,255,0.06);

  transition:0.25s;
  font-size:18px;
}

/* hover עדין עם צבע */
.btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(145deg,#23273a,#343a5a);
}

/* לחיצה */
.btn:active{
  transform:scale(0.97);
}

/* מובייל */
@media(max-width:600px){
  .btn{
    padding:20px 10px;
    font-size:16px;
  }
}
</style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EM7ZRN9RPD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-EM7ZRN9RPD');
</script>

</head>

<body>

<div class="container">

<h1>⚡ עולם הארי פוטר ⚡</h1>

<div class="notice" id="noticeBox">
⏳ טוען הודעות...
</div>

<div class="grid">

<a href="https://trhtk327.github.io/3006/" class="btn">📚<br>ספרים</a>
<a href="https://trhtk327.github.io/3005/" class="btn">🎬<br>סרטים</a>
<a href="https://trhtk327.github.io/3004/" class="btn">🧠<br>חידונים</a>
<a href="https://trhtk327.github.io/3003/" class="btn">📢<br>ערוצים</a>
<a href="https://trhtk327.github.io/3002/" class="btn">🎮<br>משחקים</a>
<a href="https://trhtk327.github.io/3001/" class="btn">💬 <br>צ'אט אונליין</a>

</div>

</div>

<script>

fetch("https://opensheet.elk.sh/19C2wMrkCiQv99o5BJrQpCkq6bXeMILbZlADDtbvwbDA/Sheet1")
.then(r=>r.json())
.then(data=>{
 let html=`<div class="notice-title">⚡ לוח מודעות ⚡</div>`;
 data.reverse().forEach(i=>{
  html+=`<div class="notice-item">
  <div style="color:${i.color};font-size:${i.size}">${i.text}</div>
  <div class="notice-time">🕒 ${i.time}</div>
  </div>`;
 });
 document.getElementById("noticeBox").innerHTML=html;
})
.catch(()=>{
 document.getElementById("noticeBox").innerHTML="❌ לא ניתן לטעון הודעות";
});
  
</script>

</body>
</html>
